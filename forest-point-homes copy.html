<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting...</title>
<meta http-equiv="refresh" content="0; url=index.html#gallery">
<script>
  (function () {
    var target = new URL('index.html', window.location.href);
    target.hash = 'gallery';
    window.location.replace(target.toString());
  })();
</script>
</head>
<body>
  <p>Redirecting to the main gallery...</p>
</body>
</html>
